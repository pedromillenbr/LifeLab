<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="pBg" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1a0e08"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="pFlame" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#pBg)"/>
  <!-- mountain silhouette -->
  <path d="M0 350 L120 240 L200 290 L280 220 L400 340 L400 400 L0 400 Z"
        fill="#0a0a0a" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.3"/>
  <!-- flame -->
  <g transform="translate(200 200)">
    <ellipse cx="0" cy="20" rx="70" ry="100" fill="url(#pFlame)" opacity="0.8"/>
    <path d="M0 -90 C 30 -60 45 -20 30 20 C 45 0 50 -30 60 -10 C 65 30 35 70 0 80 C -35 70 -65 30 -60 -10 C -50 -30 -45 0 -30 20 C -45 -20 -30 -60 0 -90 Z"
          fill="#facc15" opacity="0.9"/>
    <path d="M0 -50 C 18 -30 22 -5 12 18 C 18 5 22 -10 28 5 C 30 25 12 50 0 55 C -12 50 -30 25 -28 5 C -22 -10 -18 5 -12 18 C -22 -5 -18 -30 0 -50 Z"
          fill="#fff" opacity="0.7"/>
  </g>
  <!-- staff -->
  <line x1="200" y1="290" x2="200" y2="370" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <!-- sparks -->
  <g fill="#facc15" opacity="0.8">
    <circle cx="120" cy="180" r="1.5"/><circle cx="280" cy="160" r="2"/>
    <circle cx="100" cy="250" r="1.2"/><circle cx="310" cy="240" r="1.5"/>
    <circle cx="250" cy="120" r="1"/><circle cx="150" cy="120" r="1.5"/>
  </g>
</svg>
