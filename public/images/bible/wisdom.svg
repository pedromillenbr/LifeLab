<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="wBg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#101a14"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="wScroll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#wBg)"/>
  <!-- glow behind -->
  <circle cx="200" cy="210" r="160" fill="#22c55e" opacity="0.08"/>
  <!-- scroll body -->
  <rect x="80" y="150" width="240" height="160" rx="6" fill="url(#wScroll)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <!-- text lines -->
  <g stroke="#22c55e" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
    <line x1="105" y1="180" x2="295" y2="180"/>
    <line x1="105" y1="200" x2="270" y2="200"/>
    <line x1="105" y1="220" x2="290" y2="220"/>
    <line x1="105" y1="240" x2="250" y2="240"/>
    <line x1="105" y1="260" x2="285" y2="260"/>
    <line x1="105" y1="280" x2="240" y2="280"/>
  </g>
  <!-- scroll caps -->
  <ellipse cx="80" cy="230" rx="14" ry="86" fill="#0f1d18" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
  <ellipse cx="320" cy="230" rx="14" ry="86" fill="#0f1d18" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
  <!-- quill -->
  <path d="M150 90 L190 130 L185 145 L170 160 L150 165 L140 130 Z"
        fill="#facc15" opacity="0.85" stroke="#22c55e" stroke-width="0.5"/>
  <line x1="190" y1="130" x2="220" y2="160" stroke="#facc15" stroke-width="2" stroke-linecap="round"/>
</svg>
