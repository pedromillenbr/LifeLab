<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="dBg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e1814"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="dPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#dBg)"/>
  <circle cx="200" cy="220" r="160" fill="#22c55e" opacity="0.07"/>
  <!-- open book -->
  <g transform="translate(200 200)">
    <!-- left page -->
    <path d="M-130 -70 Q -110 -60 -10 -60 L -10 90 Q -110 80 -130 90 Z"
          fill="url(#dPage)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
    <!-- right page -->
    <path d="M130 -70 Q 110 -60 10 -60 L 10 90 Q 110 80 130 90 Z"
          fill="url(#dPage)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
    <!-- spine shadow -->
    <line x1="0" y1="-60" x2="0" y2="90" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- text lines -->
    <g stroke="#22c55e" stroke-opacity="0.45" stroke-width="1.6" stroke-linecap="round">
      <line x1="-110" y1="-40" x2="-25" y2="-40"/>
      <line x1="-110" y1="-22" x2="-30" y2="-22"/>
      <line x1="-110" y1="-4" x2="-22" y2="-4"/>
      <line x1="-110" y1="14" x2="-30" y2="14"/>
      <line x1="-110" y1="32" x2="-25" y2="32"/>
      <line x1="-110" y1="50" x2="-35" y2="50"/>
      <line x1="25" y1="-40" x2="110" y2="-40"/>
      <line x1="22" y1="-22" x2="105" y2="-22"/>
      <line x1="25" y1="-4" x2="110" y2="-4"/>
      <line x1="20" y1="14" x2="100" y2="14"/>
      <line x1="25" y1="32" x2="110" y2="32"/>
      <line x1="30" y1="50" x2="105" y2="50"/>
    </g>
    <!-- bookmark ribbon -->
    <path d="M40 -60 L40 30 L52 16 L64 30 L64 -60 Z" fill="#facc15" opacity="0.85"/>
  </g>
</svg>
