<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="rBg" cx="50%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#1a0e08"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="rThrone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="40%" stop-color="#facc15" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#rBg)"/>
  <!-- radiating rays -->
  <g transform="translate(200 200)">
    <g stroke="#facc15" stroke-opacity="0.35" stroke-linecap="round">
      <line x1="0" y1="-180" x2="0" y2="-90" stroke-width="2"/>
      <line x1="0" y1="180" x2="0" y2="90" stroke-width="2"/>
      <line x1="-180" y1="0" x2="-90" y2="0" stroke-width="2"/>
      <line x1="180" y1="0" x2="90" y2="0" stroke-width="2"/>
      <line x1="-130" y1="-130" x2="-65" y2="-65" stroke-width="1.5"/>
      <line x1="130" y1="-130" x2="65" y2="-65" stroke-width="1.5"/>
      <line x1="-130" y1="130" x2="-65" y2="65" stroke-width="1.5"/>
      <line x1="130" y1="130" x2="65" y2="65" stroke-width="1.5"/>
      <line x1="-160" y1="-90" x2="-80" y2="-45" stroke-width="1"/>
      <line x1="160" y1="-90" x2="80" y2="-45" stroke-width="1"/>
      <line x1="-90" y1="-160" x2="-45" y2="-80" stroke-width="1"/>
      <line x1="90" y1="-160" x2="45" y2="-80" stroke-width="1"/>
    </g>
    <!-- glow -->
    <circle r="160" fill="url(#rThrone)" opacity="0.6"/>
    <!-- center orb -->
    <circle r="50" fill="#facc15"/>
    <circle r="50" fill="none" stroke="#22c55e" stroke-width="1" stroke-opacity="0.7"/>
    <circle r="38" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- crown points -->
    <g fill="#facc15">
      <polygon points="-30,-58 -22,-72 -14,-58"/>
      <polygon points="-10,-62 0,-78 10,-62"/>
      <polygon points="14,-58 22,-72 30,-58"/>
    </g>
  </g>
</svg>
