<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="cSky" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0a1410"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="cSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="60%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#cSky)"/>
  <circle cx="200" cy="170" r="120" fill="url(#cSun)"/>
  <circle cx="200" cy="170" r="38" fill="#facc15" opacity="0.95"/>
  <circle cx="200" cy="170" r="38" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.6"/>
  <!-- mountains -->
  <path d="M0 280 L80 200 L130 240 L200 170 L260 230 L320 200 L400 270 L400 400 L0 400 Z"
        fill="#0f1d18" stroke="#22c55e" stroke-width="0.6" stroke-opacity="0.4"/>
  <path d="M0 320 L60 270 L130 300 L200 250 L280 295 L340 270 L400 320 L400 400 L0 400 Z"
        fill="url(#cWater)" opacity="0.8"/>
  <!-- stars -->
  <g fill="#facc15" opacity="0.7">
    <circle cx="60" cy="60" r="1.5"/><circle cx="340" cy="80" r="1.2"/>
    <circle cx="100" cy="120" r="1"/><circle cx="300" cy="50" r="1.3"/>
    <circle cx="370" cy="140" r="1"/><circle cx="50" cy="170" r="1"/>
  </g>
</svg>
