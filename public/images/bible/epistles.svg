<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="eBg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#0e1814"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="eParchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#eBg)"/>
  <circle cx="200" cy="200" r="160" fill="#22c55e" opacity="0.06"/>
  <!-- letter (envelope) -->
  <g transform="translate(80 130) rotate(-4 120 70)">
    <rect width="240" height="160" rx="8" fill="url(#eParchment)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.55"/>
    <path d="M0 8 L120 92 L240 8" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.5"/>
    <!-- text lines on visible portion -->
    <g stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.6" stroke-linecap="round">
      <line x1="30" y1="116" x2="210" y2="116"/>
      <line x1="30" y1="130" x2="180" y2="130"/>
      <line x1="30" y1="144" x2="200" y2="144"/>
    </g>
  </g>
  <!-- wax seal -->
  <g transform="translate(200 220)">
    <circle r="28" fill="#ef4444" opacity="0.85"/>
    <circle r="28" fill="none" stroke="#facc15" stroke-width="1" stroke-opacity="0.7"/>
    <circle r="20" fill="none" stroke="#facc15" stroke-width="0.6" stroke-opacity="0.6"/>
    <path d="M-10 -10 L0 8 L10 -10 M-8 0 L8 0" stroke="#facc15" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
